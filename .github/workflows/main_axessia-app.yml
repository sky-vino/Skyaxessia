name: Build and deploy Node.js app to Azure Web App - axessia-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ─── CRITICAL ────────────────────────────────────────────────────────────
    # Build inside Debian 12 (bookworm) + Node 22, which is EXACTLY what
    # Azure App Service Linux runs (GLIBC 2.36).
    # The default ubuntu-latest runner is Ubuntu 24.04 (GLIBC 2.39) — any
    # native .node binary compiled there fails on Azure with:
    #   "GLIBC_2.38 not found"
    # Running in this container ensures sqlite3 is compiled for GLIBC 2.36.
    # ─────────────────────────────────────────────────────────────────────────
    container:
      image: node:22-bookworm

    permissions:
      contents: read

    steps:
      - name: Install system build tools
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            python3 make g++ git zip curl ca-certificates
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"
          echo "GLIBC: $(ldd --version | head -1)"

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Print build context
        run: |
          echo "Building commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

      # -----------------------------------------------------------------------
      # Build backend — force sqlite3 to compile from source inside this
      # container so the .node binary targets GLIBC 2.36 (Azure-safe).
      # -----------------------------------------------------------------------
      - name: Install backend dependencies
        working-directory: backend
        env:
          npm_config_build_from_source: "sqlite3"
        run: |
          npm install --no-audit --no-fund
          npm rebuild sqlite3 --build-from-source

      - name: Verify sqlite3 loads
        working-directory: backend
        run: |
          node -e "require('sqlite3'); console.log('OK: sqlite3 loaded')"
          echo "GLIBC requirements of sqlite3 binary:"
          find node_modules/sqlite3/build/Release -name "*.node" \
            -exec ldd {} \; | grep -E "GLIBC|not found" || echo "(clean)"

      - name: Install Playwright Chromium
        working-directory: backend
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-browsers
        run: node node_modules/playwright/cli.js install chromium

      - name: Compile backend TypeScript
        working-directory: backend
        run: node node_modules/typescript/bin/tsc

      - name: Verify backend build
        run: |
          test -f backend/dist/index.js || (echo "ERROR: backend/dist/index.js MISSING" && exit 1)
          echo "OK: backend/dist/index.js present ($(wc -c < backend/dist/index.js) bytes)"

      # -----------------------------------------------------------------------
      # Build frontend
      # -----------------------------------------------------------------------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: node node_modules/vite/bin/vite.js build

      - name: Verify frontend build
        run: |
          test -f frontend/dist/index.html || (echo "ERROR: frontend/dist/index.html MISSING" && exit 1)
          echo "OK: frontend/dist/index.html present ($(wc -c < frontend/dist/index.html) bytes)"
          ls -la frontend/dist/assets/ | head

      # -----------------------------------------------------------------------
      # Prune backend to production deps only — rebuild sqlite3 again so the
      # pruned node_modules still has the correct Azure-compatible binary.
      # -----------------------------------------------------------------------
      - name: Prune backend to production deps
        working-directory: backend
        env:
          npm_config_build_from_source: "sqlite3"
        run: |
          rm -rf node_modules
          npm install --omit=dev --no-audit --no-fund
          npm rebuild sqlite3 --build-from-source
          node -e "require('sqlite3'); console.log('OK: sqlite3 still loads after prune')"

      # -----------------------------------------------------------------------
      # Stamp the commit
      # -----------------------------------------------------------------------
      - name: Stamp deployment
        run: |
          echo "commit=${{ github.sha }}" > .deploy-sha
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .deploy-sha
          cat .deploy-sha

      # -----------------------------------------------------------------------
      # Assemble and zip deploy package
      # -----------------------------------------------------------------------
      - name: Assemble deploy package
        run: |
          mkdir -p deploy
          cp -r backend/dist deploy/backend-dist
          cp -r backend/node_modules deploy/backend-node_modules
          cp backend/package.json deploy/backend-package.json
          cp -r frontend/dist deploy/frontend-dist
          cp -r playwright-browsers deploy/playwright-browsers
          cp startup.sh deploy/startup.sh
          cp .deploy-sha deploy/.deploy-sha

          mkdir -p out/backend out/frontend
          mv deploy/backend-dist out/backend/dist
          mv deploy/backend-node_modules out/backend/node_modules
          mv deploy/backend-package.json out/backend/package.json
          mv deploy/frontend-dist out/frontend/dist
          mv deploy/playwright-browsers out/playwright-browsers
          mv deploy/startup.sh out/startup.sh
          mv deploy/.deploy-sha out/.deploy-sha

          echo "=== Verify final deploy tree ==="
          ls -la out/
          echo "backend/dist:"; ls out/backend/dist/ | head -5
          echo "frontend/dist:"; ls out/frontend/dist/ | head -5
          echo "playwright-browsers:"; ls out/playwright-browsers/ | head -5
          echo ""
          echo "=== Zipping ==="
          cd out && zip -rq ../deploy.zip . && cd ..
          ls -lh deploy.zip

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          retention-days: 7
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify downloaded artifact
        run: |
          ls -lh
          echo "=== Zip contents (first 20 entries) ==="
          unzip -l deploy.zip | head -25

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_91283EA413514BF7A03CB566DA64D361 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8B585A68A244EC4BF7D854E7A5F7D9F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1CEE1CEF9E51416AA51AC8B93BD622B4 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'axessia-app'
          slot-name: 'Production'
          clean: true
          package: deploy.zip
