name: Build and deploy Node.js app to Azure Web App - axessia-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Print build context
        run: |
          echo "Building commit: ${{ github.sha }}"
          node -v
          npm -v

      # -----------------------------------------------------------------------
      # Build backend
      # -----------------------------------------------------------------------
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        working-directory: backend
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright-browsers
        run: npx playwright install chromium

      - name: Compile backend TypeScript
        working-directory: backend
        run: npm run build

      - name: Verify backend build
        run: |
          test -f backend/dist/index.js || (echo "ERROR: backend/dist/index.js MISSING" && exit 1)
          echo "OK: backend/dist/index.js present ($(wc -c < backend/dist/index.js) bytes)"

      # -----------------------------------------------------------------------
      # Build frontend
      # -----------------------------------------------------------------------
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build
        run: |
          test -f frontend/dist/index.html || (echo "ERROR: frontend/dist/index.html MISSING" && exit 1)
          echo "OK: frontend/dist/index.html present ($(wc -c < frontend/dist/index.html) bytes)"
          ls -la frontend/dist/assets/ | head

      # -----------------------------------------------------------------------
      # Prune backend to production deps (smaller artifact, faster Azure start)
      # -----------------------------------------------------------------------
      - name: Prune backend to production deps
        working-directory: backend
        run: |
          rm -rf node_modules
          npm install --omit=dev --no-audit --no-fund

      # -----------------------------------------------------------------------
      # Stamp the commit into the deploy so we can verify what's running
      # -----------------------------------------------------------------------
      - name: Stamp deployment
        run: |
          echo "commit=${{ github.sha }}" > .deploy-sha
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> .deploy-sha
          cat .deploy-sha

      # -----------------------------------------------------------------------
      # CRITICAL FIX: zip the deploy locally so upload-artifact preserves
      # nested directories (backend/dist AND backend/package.json etc).
      # The previous multi-path upload was producing empty subdirectories on
      # download because of how upload-artifact@v4 merges parent paths.
      # -----------------------------------------------------------------------
      - name: Assemble deploy package
        run: |
          mkdir -p deploy
          cp -r backend/dist deploy/backend-dist
          cp -r backend/node_modules deploy/backend-node_modules
          cp backend/package.json deploy/backend-package.json
          cp -r frontend/dist deploy/frontend-dist
          cp -r playwright-browsers deploy/playwright-browsers
          cp startup.sh deploy/startup.sh
          cp .deploy-sha deploy/.deploy-sha

          # Reassemble into wwwroot layout
          mkdir -p out/backend out/frontend
          mv deploy/backend-dist out/backend/dist
          mv deploy/backend-node_modules out/backend/node_modules
          mv deploy/backend-package.json out/backend/package.json
          mv deploy/frontend-dist out/frontend/dist
          mv deploy/playwright-browsers out/playwright-browsers
          mv deploy/startup.sh out/startup.sh
          mv deploy/.deploy-sha out/.deploy-sha

          echo "=== Verify final deploy tree ==="
          ls -la out/
          echo ""
          echo "backend/dist:"
          ls out/backend/dist/ | head -5
          echo ""
          echo "frontend/dist:"
          ls out/frontend/dist/ | head -5
          echo ""
          echo "playwright-browsers:"
          ls out/playwright-browsers/ | head -5
          echo ""
          echo "=== Zipping ==="
          cd out
          zip -rq ../deploy.zip .
          cd ..
          ls -lh deploy.zip

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          retention-days: 7
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify downloaded artifact
        run: |
          ls -lh
          echo ""
          echo "=== Zip contents (first 20 entries) ==="
          unzip -l deploy.zip | head -25

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_91283EA413514BF7A03CB566DA64D361 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8B585A68A244EC4BF7D854E7A5F7D9F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1CEE1CEF9E51416AA51AC8B93BD622B4 }}

      # -----------------------------------------------------------------------
      # Deploy the zip DIRECTLY. Azure will extract it into /home/site/wwwroot.
      # This is the proven reliable pattern.
      # -----------------------------------------------------------------------
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'axessia-app'
          slot-name: 'Production'
          clean: true
          package: deploy.zip
